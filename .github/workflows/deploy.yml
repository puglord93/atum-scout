name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH deploy → pull → build → restart
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd ~/atum-scout
            git pull origin main
            export $(cat .env | grep -v '^#' | grep -v '^$' | xargs)
            npx prisma migrate deploy || (echo "⚠ migrate retry..." && sleep 8 && npx prisma migrate deploy)
            npx prisma generate
            npm run build
            pm2 restart atum-scout --update-env
            echo "✅ Deploy complete"
